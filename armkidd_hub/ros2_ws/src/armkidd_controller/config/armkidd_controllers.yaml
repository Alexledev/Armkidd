      # joint_3:
      #   goal: 0.05
      #   trajectory: 0.0
      # joint_4:
      #   goal: 0.05
      #   trajectory: 0.0


gripper_controller:
  ros__parameters:
    joints:
      - joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position

    open_loop_control: true
    allow_integration_in_goal_trajectories: true